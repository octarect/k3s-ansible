---
- name: Cluster prep
  hosts: k3s_cluster
  gather_facts: true
  become: true
  roles:
    - role: prereq
    - role: airgap
    - role: raspberrypi
    - role: extra_device
    - role: tuner

- name: Setup K3S server
  hosts: server
  gather_facts: false
  become: true
  roles:
    - role: k3s_server

- name: Setup K3S agent
  hosts: agent
  gather_facts: false
  become: true
  roles:
    - role: k3s_agent

- name: Setup HAProxy
  hosts: loadbalancer
  become: true
  roles:
    - role: docker
    - role: haproxy
